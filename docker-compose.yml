version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: sk_mongodb
    ports:
      - "27017:27017"
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]}) }" | mongosh --port 27017 --quiet
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    container_name: sk_server
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      DATABASE_URL: mongodb://mongodb:27017/sk_associates?replicaSet=rs0&directConnection=true
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-supersecretrefreshkey}
      PORT: 4000
      NODE_ENV: production
    ports:
      - "4000:4000"
    volumes:
      - ./apps/server:/app
      - /app/node_modules

volumes:
  mongodb_data:
